@if (isOpen) {
  <div class="backdrop" dir="rtl">
    <section class="dialog">
      <header><h2>{{ title }}</h2><button type="button" (click)="close.emit()">×</button></header>
      <div class="content"><ng-content></ng-content></div>
      <footer><button type="button" class="secondary" (click)="close.emit()">انصراف</button><button type="button" [disabled]="loading" (click)="confirm.emit()">{{ loading ? 'در حال ثبت...' : 'ثبت' }}</button></footer>
    </section>
  </div>
}
