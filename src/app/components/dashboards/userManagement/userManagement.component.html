<div class="users-page" dir="rtl">

  <h1 class="page-title">
    مدیریت کاربران
  </h1>

  <app-table
    [title]="'لیست کاربران'"
    [description]="'مدیریت کاربران سیستم'"
    [data]="users"
    [columns]="columns"
    [loading]="loading"
    [totalCount]="totalCount"
    [pageNumber]="pageNumber"
    [pageSize]="pageSize"
    (search)="onSearch($event)"
    (pageChange)="onPageChange($event)"
    (create)="onAdd()"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)">
  </app-table>

  <app-base-dialog
    [isOpen]="isDialogOpen"
    [title]="dialogTitle"
    [mode]="dialogMode"
    [loading]="dialogLoading"
    (closeDialog)="closeDialog()"
    (confirm)="confirmDialog()">

    <div
      class="user-dialog-form"
      *ngIf="dialogMode === 'create'">

      <div class="form-group">
        <label>نام</label>
        <input
          type="text"
          name="createFirstName"
          [(ngModel)]="createUserForm.firstName"
          placeholder="نام را وارد کنید">
      </div>

      <div class="form-group">
        <label>نام خانوادگی</label>
        <input
          type="text"
          name="createLastName"
          [(ngModel)]="createUserForm.lastName"
          placeholder="نام خانوادگی را وارد کنید">
      </div>

      <div class="form-group">
        <label>شماره موبایل</label>
        <input
          type="text"
          name="createPhoneNumber"
          [(ngModel)]="createUserForm.phoneNumber"
          placeholder="09123456789">
      </div>

      <div class="form-group">
        <label>رمز عبور</label>
        <input
          type="password"
          name="createPasswordHash"
          [(ngModel)]="createUserForm.passwordHash"
          placeholder="رمز عبور را وارد کنید">
      </div>

      <div class="form-group">
        <label>نقش کاربر</label>
        <select
          name="createRoleName"
          [(ngModel)]="createUserForm.roleName">

          <option value="">
            انتخاب نقش
          </option>

          <option
            *ngFor="let role of roles"
            [value]="role.roleName">
            {{ roleTitles[role.roleName] || role.roleName }}
          </option>

        </select>
      </div>

      <div class="form-group">
        <label>جنسیت</label>
        <select
          name="createGender"
          [(ngModel)]="createUserForm.gender">

          <option [ngValue]="null">
            انتخاب جنسیت
          </option>

          <option [ngValue]="0">
            مرد
          </option>

          <option [ngValue]="1">
            زن
          </option>

        </select>
      </div>

      <div class="form-group">
        <label>تاریخ تولد</label>
        <app-persian-date-picker
          (dateChanged)="onBirthDateChanged($event)">
        </app-persian-date-picker>
      </div>

      <div class="form-group">
        <label>انتخاب تصویر پروفایل</label>

        <label class="file-picker">
          <span>
            {{ selectedImageName || 'انتخاب تصویر' }}
          </span>

          <input
            type="file"
            accept="image/*"
            (change)="onAvatarSelected($event)">
        </label>
      </div>

      <div class="form-check">
        <input
          id="createIsCompleteProfile"
          type="checkbox"
          name="createIsCompleteProfile"
          [(ngModel)]="createUserForm.isCompleteProfile">

        <label for="createIsCompleteProfile">
          پروفایل کاربر کامل است
        </label>
      </div>

    </div>

    <div
      class="user-dialog-form"
      *ngIf="dialogMode === 'update'">

      <div class="form-group">
        <label>نام</label>
        <input
          type="text"
          name="updateFirstName"
          [(ngModel)]="updateUserForm.firstName"
          placeholder="نام را وارد کنید">
      </div>

      <div class="form-group">
        <label>نام خانوادگی</label>
        <input
          type="text"
          name="updateLastName"
          [(ngModel)]="updateUserForm.lastName"
          placeholder="نام خانوادگی را وارد کنید">
      </div>

      <div class="form-group">
        <label>شماره موبایل</label>
        <input
          type="text"
          name="updatePhoneNumber"
          [(ngModel)]="updateUserForm.phoneNumber"
          placeholder="09123456789">
      </div>

      <div class="form-group">
        <label>نقش کاربر</label>
        <select
          name="updateRoleName"
          [(ngModel)]="updateUserForm.roleName">

          <option value="">
            انتخاب نقش
          </option>

          <option
            *ngFor="let role of roles"
            [value]="role.roleName">
            {{ roleTitles[role.roleName] || role.roleName }}
          </option>

        </select>
      </div>

      <div class="form-group">
        <label>جنسیت</label>
        <select
          name="updateGender"
          [(ngModel)]="updateUserForm.gender">

          <option [ngValue]="0">
            مرد
          </option>

          <option [ngValue]="1">
            زن
          </option>

        </select>
      </div>

      <div class="form-group">
        <label>انتخاب تصویر پروفایل</label>

        <label class="file-picker">
          <span>
            {{ selectedImageName || updateUserForm.avatarImageName || 'انتخاب تصویر' }}
          </span>

          <input
            type="file"
            accept="image/*"
            (change)="onAvatarSelected($event)">
        </label>
      </div>

      <div class="form-check">
        <input
          id="updateIsActive"
          type="checkbox"
          name="updateIsActive"
          [(ngModel)]="updateUserForm.isActive">

        <label for="updateIsActive">
          کاربر فعال باشد
        </label>
      </div>

      <div class="form-check">
        <input
          id="updateIsCompleteProfile"
          type="checkbox"
          name="updateIsCompleteProfile"
          [(ngModel)]="updateUserForm.isCompleteProfile">

        <label for="updateIsCompleteProfile">
          پروفایل کاربر کامل است
        </label>
      </div>

    </div>

    <div
      class="delete-dialog-box"
      *ngIf="dialogMode === 'delete'">

      <p>
        آیا از حذف این کاربر مطمئن هستید؟
      </p>

      <strong>
        {{ selectedUser?.firstName }} {{ selectedUser?.lastName }}
      </strong>

      <span>
        شماره موبایل:
        {{ selectedUser?.phoneNumber }}
      </span>

      <span>
        نقش:
        {{ roleTitles[selectedUser?.roleName || ''] || selectedUser?.roleName }}
      </span>

    </div>

  </app-base-dialog>

</div>
