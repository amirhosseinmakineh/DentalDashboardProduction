<main class="base-only-shell">
  <section class="base-only-card">
    <p class="eyebrow">Base System</p>
    <h1>فقط سیستم پایه باقی مانده است</h1>
    <p>داشبوردها، صفحات، لایه‌ها، داده‌های نمونه و منطق احراز هویت حذف شدند و فقط کامپوننت‌های پایه نگه داشته شده‌اند.</p>
    <div class="actions">
      <button class="btn primary" type="button" (click)="showBaseToast()">نمایش پیام پایه</button>
      <button class="btn ghost" type="button" (click)="infoOpen.set(true)">جزئیات</button>
    </div>
  </section>
</main>

<app-base-toast />
<app-base-dialog
  [open]="infoOpen()"
  title="سیستم پایه"
  confirmLabel="متوجه شدم"
  cancelLabel="بستن"
  (closed)="infoOpen.set(false)"
  (confirm)="infoOpen.set(false)"
>
  <p>این پروژه اکنون فقط شامل فولدر <strong>base</strong> و فایل‌های ضروری اجرای Angular است.</p>
</app-base-dialog>
